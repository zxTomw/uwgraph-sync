name: uwgraph-sync

services:
  neo4j:
    image: neo4j:2026.05.0
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      HEALTHCHECK_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      HEALTHCHECK_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$${HEALTHCHECK_USERNAME}\" -p \"$${HEALTHCHECK_PASSWORD}\" 'RETURN 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  app:
    build:
      context: .
      target: runtime
    environment:
      WATERLOO_API_KEY: "${WATERLOO_API_KEY:?WATERLOO_API_KEY must be set}"
      WATERLOO_BASE_URL: "${WATERLOO_BASE_URL:-https://openapi.data.uwaterloo.ca}"
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
      UWGRAPH_TERM_CODES: "${UWGRAPH_TERM_CODES:?UWGRAPH_TERM_CODES must be set}"
      UWGRAPH_SYNC_INTERVAL: "${UWGRAPH_SYNC_INTERVAL:-6h}"
      UWGRAPH_HTTP_TIMEOUT: "${UWGRAPH_HTTP_TIMEOUT:-30s}"
      UWGRAPH_SYNC_TIMEOUT: "${UWGRAPH_SYNC_TIMEOUT:-30m}"
      UWGRAPH_STARTUP_TIMEOUT: "${UWGRAPH_STARTUP_TIMEOUT:-2m}"
    depends_on:
      neo4j:
        condition: service_healthy
        restart: true
    restart: unless-stopped
    stop_grace_period: 30s

  integration-test:
    profiles: ["test"]
    build:
      context: .
      target: build
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
    depends_on:
      neo4j:
        condition: service_healthy
    command:
      [
        "go",
        "test",
        "-tags=integration",
        "-count=1",
        "./internal/neo4jstore",
      ]
    restart: "no"

volumes:
  neo4j-data:
