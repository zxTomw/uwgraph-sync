name: uwgraph-sync

x-uwgraph-service: &uwgraph-service
  image: "${UWGRAPH_IMAGE:-uwgraph-sync:local}"
  build:
    context: .
    target: runtime
  depends_on:
    neo4j:
      condition: service_healthy
      restart: true
  restart: unless-stopped
  stop_grace_period: 30s

x-neo4j-environment: &neo4j-environment
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USERNAME: "${NEO4J_USERNAME:-neo4j}"
  NEO4J_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
  NEO4J_DATABASE: "${NEO4J_DATABASE:-neo4j}"
  UWGRAPH_STARTUP_TIMEOUT: "${UWGRAPH_STARTUP_TIMEOUT:-2m}"

x-embedding-environment: &embedding-environment
  UWGRAPH_EMBEDDING_BASE_URL: "${UWGRAPH_EMBEDDING_BASE_URL:-https://api.openai.com/v1}"
  UWGRAPH_EMBEDDING_API_KEY: "${UWGRAPH_EMBEDDING_API_KEY:?UWGRAPH_EMBEDDING_API_KEY must be set}"
  UWGRAPH_EMBEDDING_MODEL: "${UWGRAPH_EMBEDDING_MODEL:?UWGRAPH_EMBEDDING_MODEL must be set}"
  UWGRAPH_EMBEDDING_DIMENSIONS: "${UWGRAPH_EMBEDDING_DIMENSIONS:?UWGRAPH_EMBEDDING_DIMENSIONS must be set}"
  UWGRAPH_EMBEDDING_BATCH_SIZE: "${UWGRAPH_EMBEDDING_BATCH_SIZE:-64}"
  UWGRAPH_EMBEDDING_TIMEOUT: "${UWGRAPH_EMBEDDING_TIMEOUT:-30s}"
  UWGRAPH_EMBEDDING_POLL_INTERVAL: "${UWGRAPH_EMBEDDING_POLL_INTERVAL:-1m}"

services:
  neo4j:
    image: neo4j:2026.05.0
    environment:
      NEO4J_AUTH: "${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
      HEALTHCHECK_USERNAME: "${NEO4J_USERNAME:-neo4j}"
      HEALTHCHECK_PASSWORD: "${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}"
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "cypher-shell -u \"$${HEALTHCHECK_USERNAME}\" -p \"$${HEALTHCHECK_PASSWORD}\" 'RETURN 1' >/dev/null",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    restart: unless-stopped

  sync:
    <<: *uwgraph-service
    environment:
      <<: *neo4j-environment
      WATERLOO_API_KEY: "${WATERLOO_API_KEY:?WATERLOO_API_KEY must be set}"
      WATERLOO_BASE_URL: "${WATERLOO_BASE_URL:-https://openapi.data.uwaterloo.ca}"
      UWGRAPH_TERM_CODES: "${UWGRAPH_TERM_CODES:?UWGRAPH_TERM_CODES must be set}"
      UWGRAPH_SYNC_INTERVAL: "${UWGRAPH_SYNC_INTERVAL:-6h}"
      UWGRAPH_HTTP_TIMEOUT: "${UWGRAPH_HTTP_TIMEOUT:-30s}"
      UWGRAPH_SYNC_TIMEOUT: "${UWGRAPH_SYNC_TIMEOUT:-30m}"

  embed:
    <<: *uwgraph-service
    entrypoint: ["/uwgraph-embed"]
    environment:
      <<: [*neo4j-environment, *embedding-environment]

  serve:
    <<: *uwgraph-service
    entrypoint: ["/uwgraph-serve"]
    environment:
      <<: [*neo4j-environment, *embedding-environment]
      UWGRAPH_KNOWLEDGE_ADDRESS: ":8080"
      UWGRAPH_KNOWLEDGE_API_KEY: "${UWGRAPH_KNOWLEDGE_API_KEY:?UWGRAPH_KNOWLEDGE_API_KEY must be set}"
      UWGRAPH_KNOWLEDGE_QUERY_TIMEOUT: "${UWGRAPH_KNOWLEDGE_QUERY_TIMEOUT:-15s}"
      UWGRAPH_MCP_ALLOWED_ORIGINS: "${UWGRAPH_MCP_ALLOWED_ORIGINS:-}"
    ports:
      - "127.0.0.1:${UWGRAPH_KNOWLEDGE_PORT:-8080}:8080"

  integration-test:
    profiles: ["test"]
    build:
      context: .
      target: build
    environment:
      <<: *neo4j-environment
    depends_on:
      neo4j:
        condition: service_healthy
    command:
      [
        "go",
        "test",
        "-tags=integration",
        "-count=1",
        "./internal/neo4jstore",
      ]
    restart: "no"

volumes:
  neo4j-data:
